<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawChat - Telegram 风格</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <style>
    /* Telegram 风格全局样式 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --tg-bg: #17212b;        /* 默认深色背景 */
      --tg-header: #242f3d;    /* 头部背景 */
      --tg-text: #ffffff;      /* 主文本 */
      --tg-hint: #7f91a4;      /* 提示文字 */
      --tg-blue: #5288c1;      /* Telegram Blue */
      --tg-blue-hover: #487ab3;
      --tg-msg-out: #2b5278;   /* 我的消息气泡 */
      --tg-msg-in: #17212b;    /* 对方消息气泡 */
      --tg-msg-out-grad: linear-gradient(135deg, #3a6ea5 0%, #487ab3 100%);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      overflow: hidden;
      height: 100vh;
    }
    
    /* === 登录页 === */
    .login-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #3a6ea5 0%, #487ab3 100%);
    }
    
    .login-card {
      width: 360px;
      background: var(--tg-header);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    
    .login-logo {
      font-size: 64px;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .login-title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      text-align: center;
      color: var(--tg-hint);
      font-size: 14px;
      margin-bottom: 24px;
    }
    
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: var(--tg-bg);
      border: 1px solid #3c4b5e;
      border-radius: 8px;
      color: var(--tg-text);
      font-size: 15px;
      margin-bottom: 12px;
    }
    
    .input-field:focus {
      border-color: var(--tg-blue);
      outline: none;
    }
    
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--tg-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn-primary:hover { background: var(--tg-blue-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    
    /* === 主应用 === */
    .app-container {
      display: flex;
      height: 100vh;
    }
    
    /* 左侧聊天列表 - PC端显示 */
    .chat-list {
      width: 360px;
      background: var(--tg-bg);
      border-right: 1px solid #0e1621;
      display: flex;
      flex-direction: column;
    }
    
    .chat-list-header {
      padding: 16px;
      background: var(--tg-header);
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #0e1621;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--tg-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }
    
    .search-bar {
      padding: 12px 16px;
      background: var(--tg-header);
      border-bottom: 1px solid #0e1621;
    }
    
    .search-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--tg-bg);
      border: 1px solid #3c4b5e;
      border-radius: 20px;
      color: var(--tg-text);
      outline: none;
    }
    
    .chat-list-scroll {
      flex: 1;
      overflow-y: auto;
    }
    
    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .chat-item:hover { background: #1f2933; }
    .chat-item.active { background: #1f2933; border-left: 3px solid var(--tg-blue); }
    
    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--tg-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    
    .chat-info {
      flex: 1;
      min-width: 0;
    }
    
    .chat-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .chat-preview {
      font-size: 14px;
      color: var(--tg-hint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .chat-time {
      font-size: 12px;
      color: var(--tg-hint);
      margin-left: 12px;
      flex-shrink: 0;
    }
    
    /* 右侧聊天区 */
    .chat-room {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--tg-bg);
    }
    
    .chat-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--tg-header);
      border-bottom: 1px solid #0e1621;
      gap: 12px;
    }
    
    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--tg-text);
    }
    
    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--tg-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .chat-header-info .header-name {
      font-size: 15px;
      font-weight: 600;
    }
    
    .chat-header-info .header-status {
      font-size: 12px;
      color: var(--tg-blue);
    }
    
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
      position: relative;
    }
    
    .message.in {
      align-self: flex-start;
      background: var(--tg-msg-in);
      border-bottom-left-radius: 2px;
    }
    
    .message.out {
      align-self: flex-end;
      background: var(--tg-msg-out-grad);
      color: white;
      border-bottom-right-radius: 2px;
    }
    
    .message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    
    .input-area {
      padding: 12px 16px;
      background: var(--tg-header);
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }
    
    .input-area textarea {
      flex: 1;
      padding: 10px 12px;
      background: var(--tg-bg);
      border: 1px solid #3c4b5e;
      border-radius: 20px;
      color: var(--tg-text);
      resize: none;
      max-height: 120px;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
    }
    
    .btn-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--tg-blue);
      color: white;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn-send:hover { background: var(--tg-blue-hover); }
    .btn-send svg { width: 20px; height: 20px; fill: currentColor; }
    
    /* 移动端 TabBar */
    .mobile-tabbar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-header);
      display: flex;
      justify-content: space-around;
      padding: 8px;
      z-index: 100;
    }
    
    @media (max-width: 768px) {
      .mobile-tabbar { display: flex; }
      .chat-list { display: none; }
      .chat-item { padding: 8px 12px; }
      .chat-avatar { width: 40px; height: 40px; font-size: 20px; }
      .chat-name { font-size: 14px; }
      .chat-preview { font-size: 13px; }
      .login-card { width: 90%; padding: 24px; }
    }
    
    /* Loading */
    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录页 -->
    <div v-if="!isLoggedIn" class="login-page">
      <div class="login-card">
        <div class="login-logo">🤖</div>
        <div class="login-title">ClawChat</div>
        <div class="login-subtitle">AI 智能聊天</div>
        
        <input type="text" class="input-field" v-model="loginForm.username" placeholder="电话号码 / 用户名 / 邮箱" @keydown.enter="handleLogin" />
        <input type="password" class="input-field" v-model="loginForm.password" placeholder="密码" @keydown.enter="handleLogin" />
        
        <button class="btn-primary" @click="handleLogin" :disabled="loginLoading">
          <span v-if="loginLoading" class="loader"></span>
          <span v-else>登录</span>
        </button>
      </div>
    </div>
    
    <!-- 主应用 -->
    <div v-else class="app-container">
      <!-- 左侧聊天列表 -->
      <div class="chat-list" v-if="currentChat">
        <div class="chat-list-header">
          <div class="user-avatar" @click="logout">
            <img :src="userAvatar" v-if="userAvatar" style="width: 100%; height: 100%; border-radius: 50%;" />
            <span v-else>👤</span>
          </div>
          <div style="font-weight: 600;">我的资料</div>
        </div>
        
        <div class="search-bar">
          <input type="text" class="search-input" placeholder="搜索聊天..." v-model="searchText" />
        </div>
        
        <div class="chat-list-scroll">
          <div class="chat-item" :class="{ active: chat.id === currentChat.id }" v-for="chat in filteredChats" :key="chat.id" @click="selectChat(chat)">
            <div class="chat-avatar">{{ chat.avatar }}</div>
            <div class="chat-info">
              <div class="chat-name">{{ chat.name }}</div>
              <div class="chat-preview">{{ chat.lastMessage || '暂无消息' }}</div>
            </div>
            <div class="chat-time">{{ chat.time }}</div>
          </div>
        </div>
      </div>
      
      <!-- 右侧聊天区 -->
      <div class="chat-room" v-if="currentChat">
        <div class="chat-header">
          <div class="back-btn" @click="currentChat = null">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </div>
          <div class="chat-header-avatar">{{ currentChat.avatar }}</div>
          <div class="chat-header-info">
            <div class="header-name">{{ currentChat.name }}</div>
            <div class="header-status">在线</div>
          </div>
        </div>
        
        <div class="message-list" ref="msgList" @scroll="onScroll">
          <div v-for="(msg, idx) in chatMessages" :key="idx" class="message" :class="msg.sender === 'user' ? 'out' : 'in'">
            <div>{{ msg.content }}</div>
            <div class="message-time">{{ msg.time }}</div>
          </div>
        </div>
        
        <div class="input-area">
          <textarea ref="msgInput" v-model="inputText" placeholder="输入消息..." rows="1" @keydown.enter="sendMessage" @input="autoResize"></textarea>
          <button class="btn-send" @click="sendMessage">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
      
      <!-- 移动端 TabBar -->
      <div class="mobile-tabbar">
        <div class="tab-item" @click="currentChat = null"><svg style="width:24px;height:24px;fill:#7f91a4" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg></div>
        <div class="tab-item"><svg style="width:24px;height:24px;fill:#7f91a4" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4v8l4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H6V6h12v8zm-5-5H6V4h8v5z"/></svg></div>
        <div class="tab-item"><svg style="width:24px;height:24px;fill:#7f91a4" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
      </div>
    </div>
  </div>
  
  <script>
    // 持久化工具
    const storage = {
      set(key, value) {
        try { window.localStorage.setItem('clawchat_' + key, JSON.stringify(value)); return true; }
        catch { return false; }
      },
      get(key, defaultValue = null) {
        try {
          const val = window.localStorage.getItem('clawchat_' + key);
          return val ? JSON.parse(val) : defaultValue;
        } catch { return defaultValue; }
      },
      remove(key) { window.localStorage.removeItem('clawchat_' + key); }
    };
    
    // 模拟的数据
    const initialChats = [
      { id: 'bot_001', name: 'AI小爪', avatar: '🤖', lastMessage: '你好！有什么可以帮你的吗？', time: '10:30' },
      { id: 'bot_002', name: '写作大师', avatar: '✍️', lastMessage: '我已经写好了...', time: '昨天' }
    ];
    
    const { createApp, ref, computed, onMounted } = Vue;
    
    createApp({
      data() {
        return {
          loginForm: { username: '', password: '' },
          loginLoading: false,
          currentChat: null,
          chats: [],
          inputText: '',
          searchText: '',
          userAvatar: null,
          currentMessages: []
        };
      },
      computed: {
        isLoggedIn() {
          const user = storage.get('user', null);
          return user && user.token;
        },
        filteredChats() {
          return this.chats.filter(chat => chat.name.includes(this.searchText));
        },
        chatMessages: {
          get() { return this.currentMessages; },
          set(val) { this.currentMessages = val; }
        }
      },
      methods: {
        async handleLogin() {
          if (!this.loginForm.username || !this.loginForm.password) { alert('请输入用户名和密码'); return; }
          this.loginLoading = true;
          
          try {
            // 模拟登录
            const user = { username: this.loginForm.username, token: 'token_' + Date.now() };
            storage.set('user', user);
            
            // 加载历史消息
            this.chats = storage.get('chats', initialChats);
            
            alert('登录成功！');
            this.loginForm = { username: '', password: '' };
          } catch (e) {
            alert('登录失败: ' + e.message);
          }
          
          this.loginLoading = false;
        },
        logout() {
          storage.remove('user');
          this.chats = [];
          this.currentChat = null;
          this.currentMessages = [];
          alert('已退出登录');
        },
        selectChat(chat) {
          this.currentChat = chat;
          // 加载该聊天的历史消息
          this.currentMessages = storage.get('messages_' + chat.id, [
            { content: '你好！我是 ' + chat.name + '，有什么可以帮你的吗？', sender: 'bot', time: '10:30' }
          ]);
          this.scrollToBottom();
        },
        sendMessage() {
          if (!this.inputText.trim()) return;
          
          const msg = {
            content: this.inputText.trim(),
            sender: 'user',
            time: this.getTime()
          };
          
          this.currentMessages.push(msg);
          this.inputText = '';
          this.scrollToBottom();
          
          // 保存消息
          if (this.currentChat) {
            const history = storage.get('messages_' + this.currentChat.id, []);
            history.push(msg);
            storage.set('messages_' + this.currentChat.id, history);
          }
          
          // 模拟机器人回复
          setTimeout(() => {
            const reply = {
              content: '收到：' + msg.content,
              sender: 'bot',
              time: this.getTime()
            };
            this.currentMessages.push(reply);
            this.scrollToBottom();
            
            // 保存回复
            if (this.currentChat) {
              const history = storage.get('messages_' + this.currentChat.id, []);
              history.push(reply);
              storage.set('messages_' + this.currentChat.id, history);
              
              // 更新聊天列表最后一条
              const chat = this.chats.find(c => c.id === this.currentChat.id);
              if (chat) {
                chat.lastMessage = reply.content;
                chat.time = reply.time;
                storage.set('chats', this.chats);
              }
            }
          }, 800);
        },
        autoResize(e) {
          e.target.style.height = 'auto';
          e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
        },
        scrollToBottom() {
          this.$nextTick(() => {
            if (this.$refs.msgList) {
              this.$refs.msgList.scrollTop = this.$refs.msgList.scrollHeight;
            }
          });
        },
        onScroll() {
          this.$nextTick(() => {
            if (this.$refs.msgList) {
              const { scrollTop, scrollHeight, clientHeight } = this.$refs.msgList;
              if (scrollTop < 100) {
                // 自动加载更多
              }
            }
          });
        },
        getTime() {
          return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
      },
      mounted() {
        // 恢复登录态
        const user = storage.get('user', null);
        if (user && user.token) {
          this.chats = storage.get('chats', initialChats);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
